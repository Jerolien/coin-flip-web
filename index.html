<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      href="resources/favicon.ico"
      type="image/x-icon"
      sizes="96x96"
    />

    <title>Flip the coin | devChallenges.io</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color:#404A65;
        height: 100vh;
      }

      .author-info {
        font-size: 16px;
        text-align: center;
        margin-top: 16px;
        color: rgb(55, 65, 81);
        margin-top:20px;
      }

      .author-info a {
        text-decoration: none;
      }

      .title {
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color:#ECEDF1;
        font-size: 30px;
        text-shadow: 
        5px 5px 0px #35383F, 
        -5px -5px 0px #35383F, 
        5px -5px 0px #35383F, 
        -5px 5px 0px #35383F;
        text-align: center;
        margin-top: 20px;
      }

      .press {
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color:#ECEDF1;
        font-size: 10px;
        text-align:center;
        margin-top: 30px;
        text-align:center;
      }

      .headssvg {
        height: 25%;
        width:100%;
        display:flex;
        justify-content:center;
        margin-top:80px;
      }

      .shadow {
        height: 2%;
        width:100%;
        display:flex;
        justify-content:center;
        margin-top:50px;
      }

      .headstext {
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color:#ECEDF1;
        font-size: 15px;
        text-align:center;
        margin-top: 30px;
        
      }

      

      
      .flex-container {
        display:flex;
        justify-content:center;
        margin-top: 20px;
  
      }

      .flex-container  .shadow-text{
        font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
        color:white;
        background-color:#206FB1;

        padding: 15px 40px;
        font-size: 15px;
        border-radius: 10px 10px 10px 10px;
        border-bottom:4px solid #23649A;
      
      }

      
    </style>
  </head>
  <body>

    <!-- 

    Flip a Coin Game
    Press the coin or the button to flip the coin
    Head
    Tail
    Random
  
    -->
  
    <div class="title">
      <h1>Flip the coin</h1>
    </div>

    <div class="press">
      <h1>Press the coin or the button to flip the coin</h1>
    </div>

    <div class=headssvg >
    <img src="resources/heads.svg">
    </div>

    <div class=shadow>
    <img src="resources/shadow.svg">
    </div class="heads">

    <div class="headstext">
      <h1>Heads</h1>
    </div>

    <div class="flex-container">
      <div class="shadow-text">      
      <h1>Random</h1>
      </div>
    </div>

  </body>
</html>
